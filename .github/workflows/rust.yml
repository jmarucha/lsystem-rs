name: Cargo Build & Test
# from the cargo Book      - name: Cache
on:
  push:
  pull_request:

env: 
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Rust project - latest
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain:
          - stable
        build_profile:
          - release
        target:
          - x86_64-pc-windows-gnu
          - x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - name: Cache
        uses: actions/cache@v5.0.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-${{ matrix.target }}
      - name: Install mingw
        run: sudo apt install -y mingw-w64
        if: ${{ matrix.target == 'x86_64-pc-windows-gnu' }}
      - run: rustup update ${{ matrix.toolchain }} && rustup default ${{ matrix.toolchain }}
      - run: rustup target add ${{ matrix.target }}
      - run: cargo build --profile ${{ matrix.build_profile }} --target ${{ matrix.target }}
      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: lsystem-rs-${{ matrix.target }}
          path: target/${{ matrix.target }}/${{ matrix.build_profile }}/lsystem${{ matrix.target == 'x86_64-pc-windows-gnu' && '.exe' || '' }}
          
  release:
    name: Release binaries
    needs: [build]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
    - name: Download release artifact (Windows)
      uses: actions/download-artifact@v5
      with:
        name: lsystem-rs-x86_64-pc-windows-gnu
        path: ./lsystem.exe
    - name: Download release artifact (Linux)
      uses: actions/download-artifact@v5
      with:
        name: lsystem-rs-x86_64-unknown-linux-gnu
        path: ./lsystem
    - run: |
        gh release create --generate-notes "CI Build" -p
